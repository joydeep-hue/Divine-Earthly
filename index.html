<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Earthly | Sovereign Portal</title>
    <style>
        :root { --gold: #d4af37; --space: #050505; }
        body { 
            background: radial-gradient(circle, #1a1a1a 0%, var(--space) 100%);
            color: #f0f0f0; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .card { 
            max-width: 450px; width: 90%; background: rgba(15,15,15,0.9);
            border: 1px solid var(--gold); padding: 30px; border-radius: 25px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2); text-align: center;
        }
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin: 15px 0; }
        .logo { width: 80px; filter: drop-shadow(0 0 8px var(--gold)); }
        .links { margin-top: 25px; }
        .btn { 
            display: block; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px; margin: 12px 0; border-radius: 50px;
            text-decoration: none; font-weight: bold; letter-spacing: 1px;
            transition: 0.3s; font-size: 0.9rem;
        }
        .btn:hover { background: var(--gold); color: var(--space); box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://img.freepik.com/premium-photo/sacred-geometry-sri-yantra-gold-isolated-black-background_917506-18035.jpg" class="logo">
        <h1>Divine Earthly</h1>
        <p>Bridging Ancient Vedic Science with Quantum Super-Intelligence.</p>
        <div class="links">
            <a href="https://linktr.ee/divineearthly" class="btn">Linktree Portal</a>
            <a href="paper.html" class="btn">Read White Paper</a>
            <a href="https://t.me/your_telegram" class="btn">Join Resonance</a>
        </div>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 25px;">STATION: 108.432 | ALPHA BUILD</p>
    </div>
</body>
</html>
